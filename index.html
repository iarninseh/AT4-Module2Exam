<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>GIS Map of Pasong Putik Proper</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="styles.css"/>
</head>

<body>
    <h1 id="title">GIS Map of Pasong Putik Proper</h1>
    <div id="map"></div>
    
    <div id="routing-info">
        <h4 style="margin: 0 0 5px 0;">Route Matrix</h4>
        <div id="route-metrics">Select a house or search a location...</div>
    </div>

    <button id="end-button" type="button" onclick="endRouting()">End Routing</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/esri-leaflet/dist/esri-leaflet.js"></script>
    
    <script src="functions.js"></script>
</body>

</html>
