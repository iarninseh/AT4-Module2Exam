<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css"/>
    <style>
        #map {
            height: 900px;
            width: 100%;
        }
    </style>
</head>

<body>
    <h1 id="title">GIS Map of Pasong Putik Proper</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        //Initialize map view
        const map = L.map('map').setView([14.73, 121.06], 13);

        //Define the base map layer
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

    //Information of 14.7399741, 121.0694429
        //Marker for both Tooltip and Popup
        const houseMarker = L.marker([14.7399741, 121.0694429]).addTo(map);

        // Bind the Tooltip (shows on hover)
        houseMarker.bindTooltip(
            "House Information<br>Address: Block 17 Lot 4, Romans St. Corner Palau St., Sacred Heart Village, Pasong Putik, Quezon City<br>Lot Size: 326 sqm<br>House Size: 210 sqm<br>Number of Residents: 6 (Adult: 6 Child: 0)"
        );

        // Bind the Popup (shows on click)
        houseMarker.bindPopup(`
            <div style="font-family: Arial, sans-serif; padding: 5px; min-width: 200px;">
                <h4 style="margin: 0 0 8px 0;">Inspection Tasks</h4>
                <label style="display: block; margin: 6px 0; cursor: pointer;">
                    <input type="checkbox" id="task-resident-count" onchange="saveTaskState(this)"> Verify resident count (6)
                </label>
                <label style="display: block; margin: 6px 0; cursor: pointer;">
                    <input type="checkbox" id="task-vax-card" onchange="saveTaskState(this)"> Request for vaccination card/s
                </label>
                <label style="display: block; margin: 6px 0; cursor: pointer;">
                    <input type="checkbox" id="task-safety-notice" onchange="saveTaskState(this)"> Deliver safety notice
                </label>
            </div>
        `);

        // Function to save individual checkbox states to localStorage
        function saveTaskState(checkbox) {
            localStorage.setItem(checkbox.id, checkbox.checked);
        }

        // Event listener that runs every time the popup opens to reload saved states
        houseMarker.on('popupopen', function() {
            const taskIds = ['task-resident-count', 'task-vax-card', 'task-safety-notice'];
            
            taskIds.forEach(id => {
                const checkbox = document.getElementById(id);
                if (checkbox) {
                    // localStorage saves everything as strings, so we check if it equals 'true'
                    checkbox.checked = localStorage.getItem(id) === 'true';
                }
            });
        });
        
        // Load the GeoJSON data and add it to the map.
        fetch('export.geojson')
            .then(res => res.json())
            .then(data => {
                const layer = L.geoJSON(data, {
                    // Set CSS styling for the GeoJSON layer to make it visually distinct.
                    style: {
                        color: 'red',
                        weight: 2,
                        fillOpacity: 0.1
                    }
                }).addTo(map);
                map.fitBounds(layer.getBounds());
            });
    </script>
</body>

</html>
