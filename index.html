<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="styles.css"/>
    <style>
        #map {
            height: 900px;
            width: 100%;
        }
    </style>
</head>

<body>
    <h1 id="title">GIS Map of Pasong Putik Proper</h1>
    <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <script>
        // Counter to generate unique IDs for marker checkboxes
        let markerCount = 0;

        //Initialize map view
        const map = L.map('map').setView([14.73, 121.06], 13);

        //Define the base map layer
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        //Initialize the Geocoder Control
        const geocoderControl = L.Control.geocoder({
            defaultMarkGeocode: true,
            placeholder: "Search streets or buildings...",
            collapsed: false 
        }).addTo(map);

        //Looks for the input element generated by the geocoder plugin
        const searchInput = document.querySelector('.leaflet-control-geocoder-form input');
        
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                // If the user clears out the text box
                if (this.value.trim() === "") {
                    // Check if the geocoder has an active mark layer on the map and remove it
                    if (geocoderControl._geocodeMarker) {
                        map.removeLayer(geocoderControl._geocodeMarker);
                        geocoderControl._geocodeMarker = null; // Reset the reference
                    }
                }
            });
        }

        //Marker for both Tooltip and Popup
        const customIcon = L.icon({
            iconUrl: 'assets/red marker.png', // Path to your custom icon image
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });

        // Define the markers with their coordinates and house information
        markers = [{
            coords: [14.7399741, 121.0694429],
            houseInfo: "House Information<br>Address: Block 17 Lot 4, Romans St. Corner Palau St., Sacred Heart Village, Pasong Putik, Quezon City<br>Lot Size: 326 sqm<br>House Size: 210 sqm<br>Number of Residents: 6 (Adult: 6 Child: 0)"
        }, {
            coords: [14.7373541, 121.0682915],
            houseInfo: "House Information<br>Address: Sacred Heart Village, 6A St Andrew, Pasong Putik, Novaliches, Quezon City<br>Lot Size: -- sqm<br>House Size: -- sqm<br>Number of Residents: -- (Adult: -- Child: --)"
        }];

        // Loop through the markers array and add each marker to the map
        for (let i = 0; i < markers.length; i++) {
            addMarker(markers[i].coords, markers[i].houseInfo);
        }

        // Function to save the state of the checkboxes in localStorage
        function saveTaskState(checkbox) {
            localStorage.setItem(checkbox.id, checkbox.checked);
        }

        // Event listener that runs every time the popup opens to reload saved states
        function setupTaskRestore(marker, taskIds) {
            marker.on('popupopen', function() {
                taskIds.forEach(id => {
                    const checkbox = document.getElementById(id);
                    if (checkbox) {
                        checkbox.checked = localStorage.getItem(id) === 'true';
                    }
                });
            });
        }

        // Function to add a marker with a tooltip and popup containing inspection tasks
        function addMarker(coords, houseInfo) {
            markerCount++;
            const marker = L.marker(coords, { icon: customIcon }).addTo(map);

            marker.bindTooltip(houseInfo);

            marker.bindPopup(`
                <div style="font-family: Arial, sans-serif; padding: 5px; min-width: 200px;">
                    <h4 style="margin: 0 0 8px 0;">Inspection Tasks</h4>
                    <label style="display: block; margin: 6px 0; cursor: pointer;">
                        <input type="checkbox" id="task${markerCount}-resident-count" onchange="saveTaskState(this)"> Verify resident count
                    </label>
                    <label style="display: block; margin: 6px 0; cursor: pointer;">
                        <input type="checkbox" id="task${markerCount}-vax-card" onchange="saveTaskState(this)"> Request for vaccination card/s
                    </label>
                    <label style="display: block; margin: 6px 0; cursor: pointer;">
                        <input type="checkbox" id="task${markerCount}-safety-notice" onchange="saveTaskState(this)"> Deliver safety notice
                    </label>
                </div>`);
            
            setupTaskRestore(marker, [`task${markerCount}-resident-count`, `task${markerCount}-vax-card`, `task${markerCount}-safety-notice`]);
            return marker;
        }
        
        // Load the GeoJSON data and add it to the map.
        fetch('export.geojson')
            .then(res => res.json())
            .then(data => {
                const layer = L.geoJSON(data, {
                    style: {
                        color: 'red',
                        weight: 2,
                        fillOpacity: 0.1
                    }
                }).addTo(map);
                map.fitBounds(layer.getBounds());
            });
    </script>
</body>

</html>
