<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>GIS Map of Pasong Putik Proper</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="styles.css"/>
    <style>
        #map {
            height: 900px;
            width: 100%;
        }
        #routing-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
            display: none; /* Hidden until a route is generated */
        }
    </style>
</head>

<body>
    <h1 id="title">GIS Map of Pasong Putik Proper</h1>
    <div id="map"></div>
    
    <div id="routing-info">
        <h4 style="margin: 0 0 5px 0;">Route Matrix</h4>
        <div id="route-metrics">Select a house or search a location...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    
    <script>
        let markerCount = 0;

        // Initialize map view
        const map = L.map('map').setView([14.735, 121.060], 15);

        // Define the base map layer
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        //Barangay Satellite Office (Along Sampaguita St., behind Fairview Terraces)
        const satelliteOfficeCoords = [14.7385201, 121.0602773]; 

        // Distinct marker icon for the Satellite Office
        const officeIcon = L.icon({
            iconUrl: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png', // Blue marker pin
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });
        
        // Add Satellite Office Pin to Map
        L.marker(satelliteOfficeCoords, { icon: officeIcon })
         .addTo(map)
         .bindPopup("<b>Barangay Satellite Office</b><br>Sampaguita St. (Tapat ng Station 16, likod ng Fairview Terraces)");

        // Initialize Routing Control
        const routingControl = L.Routing.control({
            waypoints: [],
            createMarker: function() { return null; }, // Suppress default routing flags to keep map layout clean
            routeWhileDragging: false,
            show: false, // Hides the bulky default text step-by-step navigation list panel
            lineOptions: {
                styles: [{ color: '#007bff', weight: 5, opacity: 0.7 }]
            }
        }).addTo(map);

        // Helper function to update routing path safely from the Satellite office base
        function updateRouteTo(targetLatLng) {
            routingControl.setWaypoints([
                L.latLng(satelliteOfficeCoords), 
                L.latLng(targetLatLng)
            ]);
        }

        // Listen for route calculation updates to display metrics in custom UI overlay
        routingControl.on('routesfound', function(e) {
            const routes = e.routes;
            const summary = routes[0].summary;
            
            // Convert metrics: distance (meters -> km), time (seconds -> minutes)
            const distanceKm = (summary.totalDistance / 1000).toFixed(2);
            const timeMinutes = Math.round(summary.totalTime / 60);
            
            // Display metrics in our custom HTML UI panel
            const infoPanel = document.getElementById('routing-info');
            const metricsDiv = document.getElementById('route-metrics');
            infoPanel.style.display = 'block';
            metricsDiv.innerHTML = `
                <b>Distance:</b> ${distanceKm} km<br>
                <b>Est. Travel Time:</b> ${timeMinutes} mins
            `;
        });

        // Initialize the Geocoder Control
        const geocoderControl = L.Control.geocoder({
            defaultMarkGeocode: false, // Turn off default behavior to prevent duplicate generic markers
            placeholder: "Search streets or buildings...",
            collapsed: false 
        }).addTo(map);

        //Event listener to calculate routing instantly for searched entries
        geocoderControl.on('markgeocode', function(e) {
            const geocodeResult = e.geocode;
            
            // Clear prior geocoded temporary indicators if they exist
            if (geocoderControl._customGeocodeMarker) {
                map.removeLayer(geocoderControl._customGeocodeMarker);
            }

            // Create a clear marker on the searched point
            geocoderControl._customGeocodeMarker = L.marker(geocodeResult.center )
                .addTo(map)
                .bindPopup(`<b>Searched Location:</b><br>${geocodeResult.name}`)
                .openPopup();

            // Shift map frame view to include the newly discovered coordinates
            map.setView(geocodeResult.center, 16);

            // Execute the routing pipeline to update calculations
            updateRouteTo(geocodeResult.center);
        });

        // Monitor input field resetting
        const searchInput = document.querySelector('.leaflet-control-geocoder-form input');
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                if (this.value.trim() === "") {
                    if (geocoderControl._customGeocodeMarker) {
                        map.removeLayer(geocoderControl._customGeocodeMarker);
                        geocoderControl._customGeocodeMarker = null;
                    }
                    // Hide routing summary framework panel since search parameter was removed
                    document.getElementById('routing-info').style.display = 'none';
                    routingControl.setWaypoints([]);
                }
            });
        }

        // Custom marker setup for households
        const customIcon = L.icon({
            iconUrl: 'https://maps.google.com/mapfiles/ms/icons/red-dot.png', // Fallback standard red marker pin
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });

        // Household Markers Array
        const markers = [
            {
                coords: [14.7399741, 121.0694429],
                houseInfo: "House Information<br>Address: Block 17 Lot 4, Romans St. Corner Palau St., Sacred Heart Village, Pasong Putik, Novaliches, Quezon City<br>Lot Size: 326 sqm<br>House Size: 210 sqm<br>Number of Residents: 6 (Adult: 6 Child: 0)"
            }, 
            {
                coords: [14.7373541, 121.0682915],
                houseInfo: "House Information<br>Address: 6A St Andrew, Sacred Heart Village, Pasong Putik, Novaliches, Quezon City<br>Lot Size: -- sqm<br>House Size: -- sqm<br>Number of Residents: -- (Adult: -- Child: --)"
            }
        ];

        // Loop through the markers array
        for (let i = 0; i < markers.length; i++) {
            addMarker(markers[i].coords, markers[i].houseInfo);
        }

        function saveTaskState(checkbox) {
            localStorage.setItem(checkbox.id, checkbox.checked);
        }

        function setupTaskRestore(marker, taskIds) {
            marker.on('popupopen', function() {
                taskIds.forEach(id => {
                    const checkbox = document.getElementById(id);
                    if (checkbox) {
                        checkbox.checked = localStorage.getItem(id) === 'true';
                    }
                });
            });
        }

        // Function to add a marker with routing trigger referencing the Satellite Office
        function addMarker(coords, houseInfo) {
            markerCount++;
            const marker = L.marker(coords, { icon: customIcon }).addTo(map);

            marker.bindTooltip(houseInfo);

            marker.bindPopup(`
                <div style="font-family: Arial, sans-serif; padding: 5px; min-width: 200px;">
                    <h4 style="margin: 0 0 8px 0;">Inspection Tasks</h4>
                    <label style="display: block; margin: 6px 0; cursor: pointer;">
                        <input type="checkbox" id="task${markerCount}-resident-count" onchange="saveTaskState(this)"> Verify resident count
                    </label>
                    <label style="display: block; margin: 6px 0; cursor: pointer;">
                        <input type="checkbox" id="task${markerCount}-vax-card" onchange="saveTaskState(this)"> Request for vaccination card/s
                    </label>
                    <label style="display: block; margin: 6px 0; cursor: pointer;">
                        <input type="checkbox" id="task${markerCount}-safety-notice" onchange="saveTaskState(this)"> Deliver safety notice
                    </label>
                </div>`);
            
            // ROUTING TRIGGER: Direct call to update routing paths from Satellite Office boundary click
            marker.on('click', function() {
                updateRouteTo(coords);
            });

            setupTaskRestore(marker, [`task${markerCount}-resident-count`, `task${markerCount}-vax-card`, `task${markerCount}-safety-notice`]);
            return marker;
        }
        
        // Load the GeoJSON data
        fetch('export.geojson')
            .then(res => res.json())
            .then(data => {
                const layer = L.geoJSON(data, {
                    style: {
                        color: 'red',
                        weight: 2,
                        fillOpacity: 0.1
                    }
                }).addTo(map);
                map.fitBounds(layer.getBounds());
            }).catch(err => console.log("GeoJSON layout configuration payload skipped. Continuing runtime render layer setup."));
    </script>
</body>

</html>
